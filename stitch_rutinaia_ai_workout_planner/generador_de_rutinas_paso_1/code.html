<body class="font-body-md text-on-background min-h-screen flex flex-col">

<div class="flex items-center gap-md">

<!-- Main Content Canvas -->

<div class="flex justify-between mb-sm">

<div class="h-full w-[14.28%] bg-white/5 rounded-full"></div>
<div class="h-full w-[14.28%] bg-white/5 rounded-full"></div>
<div class="h-full w-[14.28%] bg-white/5 rounded-full"></div>
</div>
</div>
<!-- Question Card -->
<div class="glass-card rounded-xl p-lg md:p-xl shadow-2xl">
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">¿Dónde vas a entrenar?</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-md mx-auto">Selecciona tu entorno de entrenamiento principal para que la IA adapte los ejercicios a tu equipamiento disponible.</p>
</div>
<!-- Big Button Options -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-md">
<!-- Option: Gimnasio -->
<button class="group relative flex flex-col items-center justify-center p-xl rounded-xl glass-card transition-all duration-300 hover:border-primary-container hover:bg-primary-container/5 active:scale-95" onclick="selectOption(this)">
<div class="mb-md p-md rounded-full bg-surface-container-high group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-4xl group-hover:text-primary-container transition-colors">fitness_center</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary-container">Gimnasio</span>

</button>
<!-- Option: Casa -->
<button class="group relative flex flex-col items-center justify-center p-xl rounded-xl glass-card transition-all duration-300 hover:border-primary-container hover:bg-primary-container/5 active:scale-95" onclick="selectOption(this)">
<div class="mb-md p-md rounded-full bg-surface-container-high group-hover:bg-primary-container/20 transition-colors">

</div>

<div class="flex gap-md">

                    <span class="material-symbols-outlined">arrow_forward_ios</span>
</button>

<!-- Background Decorative Elements -->
<div class="fixed top-1/4 -right-20 w-80 h-80 bg-primary-container/10 blur-[100px] rounded-full -z-10"></div>
<div class="fixed bottom-1/4 -left-20 w-96 h-96 bg-secondary-container/10 blur-[100px] rounded-full -z-10"></div>
<script>
        function selectOption(btn) {
            // Remove active classes from all buttons
            document.querySelectorAll('button').forEach(b => {
                if (b.classList.contains('glass-card')) {
                    b.classList.remove('border-primary-container', 'bg-primary-container/10', 'neon-glow');
                }
            });
            // Add active classes to selected button
            btn.classList.add('border-primary-container', 'bg-primary-container/10', 'neon-glow');
            
            // Interaction feedback
            const icon = btn.querySelector('.material-symbols-outlined');
            icon.style.transform = 'scale(1.2)';
            setTimeout(() => {
                icon.style.transform = 'scale(1)';
            }, 200);
        }
    </script>
