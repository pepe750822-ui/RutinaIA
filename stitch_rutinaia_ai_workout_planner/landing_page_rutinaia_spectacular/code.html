<script>
        // Micro-interaction for the cards
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('touchstart', () => {
                card.style.transform = 'scale(0.98)';
                card.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
            });
            card.addEventListener('touchend', () => {
                card.style.transform = 'scale(1)';
            });
        });

        // Simple mouse movement glow effect for desktop users
        if (window.innerWidth > 768) {
            document.body.addEventListener('mousemove', (e) => {
                const x = e.clientX;
                const y = e.clientY;
                const glow = document.querySelector('.ai-glow');
                if(glow) {
                    glow.style.transform = `translate(${(x - window.innerWidth/2)/20}px, ${(y - window.innerHeight/2)/20}px)`;
                }
            });
        }
    </script>
